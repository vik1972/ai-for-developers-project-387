name: Deploy to Render

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  e2e-tests:
    name: Run E2E Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: |
          npm ci
          npm install -g wait-on

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Prepare test database
        env:
          RAILS_ENV: test
        run: bin/rails db:test:prepare db:seed

      - name: Start Rails server
        env:
          RAILS_ENV: test
        run: |
          setsid sh -c 'bundle exec rails server -p 3001' >/tmp/rails.log 2>&1 &
          sleep 5
          cat /tmp/rails.log || true
          npx wait-on http://localhost:3001/api/public/events --timeout 120000

      - name: Start frontend and run E2E tests
        working-directory: frontend
        run: |
          npm run dev > /tmp/vite.log 2>&1 &
          sleep 2
          npx wait-on http://localhost:3000 --timeout 60000
          npx playwright test
        env:
          CI: true

      - name: Upload server logs on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: server-logs
          path: |
            /tmp/rails.log
            /tmp/vite.log

  deploy:
    name: Deploy to Render
    needs: e2e-tests
    runs-on: ubuntu-latest
    if: always() && needs.e2e-tests.result == 'success'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Render
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "⚠️ RENDER_DEPLOY_HOOK_URL не настроен. Пропускаем деплой."
            echo ""
            echo "Для автоматического деплоя:"
            echo "1. Создайте сервис на Render вручную один раз"
            echo "2. Получите Deploy Hook URL в настройках сервиса"
            echo "3. Добавьте его как GitHub Secret: RENDER_DEPLOY_HOOK_URL"
            exit 0
          fi
          
          echo "🚀 Деплой на Render..."
          curl -X POST "$RENDER_DEPLOY_HOOK_URL"
          echo "✅ Деплой запущен! Проверьте статус на https://dashboard.render.com"
